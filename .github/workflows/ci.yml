name: CI - stage v1.1

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_TAG: ${{ github.sha }}   # ✅ immutable tag

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # ---------------- CHECKOUT ----------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # ---------------- SETUP DOCKER ----------------
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ---------------- LOGIN TO DOCKER HUB ----------------
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

    # ---------------- BUILD & PUSH FRONTEND ----------------
    - name: Build & Push Frontend Image
      if: github.event_name == 'push'   # ❗ skip push on PR
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/frontend-app:${{ env.IMAGE_TAG }}
          ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

    # ---------------- BUILD & PUSH BACKEND ----------------
    - name: Build & Push Backend Image
      if: github.event_name == 'push'   # ❗ skip push on PR
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/backend-app:${{ env.IMAGE_TAG }}
          ${{ secrets.DOCKER_USERNAME }}/backend-app:latest